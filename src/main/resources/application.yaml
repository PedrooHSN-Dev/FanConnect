spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${FANCONNECT_EMAIL_USER}
    password: ${FANCONNECT_EMAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:fanconnectdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true